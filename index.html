<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Heroes — Screen Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #080E1C; --surface: #0F1828; --surface2: #162035;
  --border: #1E2E4A; --border2: #2A3F63;
  --accent: #C9A84C; --accent-dim: rgba(201,168,76,0.12);
  --text: #EEF2F8; --muted: #7A90B0; --muted2: #445570;
  --green: #2ECC71; --green-dim: rgba(46,204,113,0.12);
  --red: #E74C3C; --red-dim: rgba(231,76,60,0.12);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; display: flex; flex-direction: column; }

/* HEADER */
.hdr { border-top: 2px solid var(--accent); border-bottom: 1px solid var(--border); padding: 6px 14px; display: flex; align-items: center; justify-content: space-between; background: #080E1C; flex-shrink: 0; }
.logo { font-family: 'Bebas Neue', sans-serif; font-size: 16px; letter-spacing: 3px; color: #fff; line-height: 1; display: flex; align-items: center; gap: 8px; }
.logo span { color: var(--accent); font-size: 8px; font-family: 'DM Mono', monospace; letter-spacing: 2px; display: block; }
.hist-btn { background: none; border: 1px solid var(--border); color: var(--muted); font-family: 'DM Mono', monospace; font-size: 9px; padding: 4px 10px; cursor: pointer; border-radius: 3px; letter-spacing: 1px; text-transform: uppercase; }
.hist-btn:hover { border-color: var(--accent); color: var(--accent); }
.hist-btn.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }

/* STATUS */
.sbar { display: flex; gap: 5px; padding: 6px 14px; background: var(--bg); flex-shrink: 0; border-bottom: 1px solid var(--border); }
.sc { background: var(--surface); border: 1px solid var(--border); border-radius: 4px; padding: 4px 8px; flex: 1; }
.sc-l { font-family: 'DM Mono', monospace; font-size: 7px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }
.sc-n { font-family: 'Bebas Neue', sans-serif; font-size: 15px; color: var(--accent); line-height: 1.1; }
.sc-n.pos { color: var(--green); }
.sc-n.neg { color: var(--red); }

/* BODY */
.body { display: flex; flex: 1; overflow: hidden; }

/* SIDEBAR */
.side { width: 185px; flex-shrink: 0; border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 8px; gap: 7px; background: var(--surface); overflow-y: auto; }
.upload-zone { border: 2px dashed var(--border2); border-radius: 5px; padding: 12px 8px; text-align: center; cursor: pointer; transition: all 0.2s; background: var(--bg); }
.upload-zone:hover { border-color: var(--accent); background: var(--accent-dim); }
.upload-icon { font-size: 18px; margin-bottom: 3px; }
.upload-title { font-family: 'Bebas Neue', sans-serif; font-size: 12px; letter-spacing: 2px; color: var(--accent); }
.upload-sub { font-size: 9px; color: var(--muted); }
.abtn { width: 100%; padding: 8px; background: var(--accent); color: #0a0a0a; border: none; border-radius: 4px; font-family: 'Bebas Neue', sans-serif; font-size: 13px; letter-spacing: 2px; cursor: pointer; }
.abtn:hover { background: #D4B05A; }
.abtn:disabled { opacity: 0.5; cursor: not-allowed; }
.endbtn { width: 100%; padding: 7px; background: none; border: 1px solid var(--border2); color: var(--muted); font-family: 'DM Mono', monospace; font-size: 8px; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; border-radius: 3px; }
.endbtn:hover { border-color: var(--accent); color: var(--accent); }
.slabel { font-family: 'DM Mono', monospace; font-size: 7px; color: var(--muted2); letter-spacing: 1.5px; text-transform: uppercase; padding-top: 4px; border-top: 1px solid var(--border); }
.sstat { display: flex; justify-content: space-between; align-items: center; padding: 2px 0; }
.sstat-l { font-family: 'DM Mono', monospace; font-size: 9px; color: var(--muted); text-transform: uppercase; }
.sstat-v { font-family: 'Bebas Neue', sans-serif; font-size: 13px; color: var(--accent); }
.sstat-v.pos { color: var(--green); }
.sstat-v.neg { color: var(--red); }
.spacer { flex: 1; }
.spinner { width: 20px; height: 20px; border: 2px solid var(--border2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 4px; }
@keyframes spin { to { transform: rotate(360deg); } }

/* TABLE */
.twrap { flex: 1; overflow-y: auto; }
.ttable { width: 100%; border-collapse: collapse; }
.ttable thead { position: sticky; top: 0; z-index: 5; background: var(--surface); }
.ttable th { font-family: 'DM Mono', monospace; font-size: 7px; color: var(--muted2); letter-spacing: 1.5px; text-transform: uppercase; padding: 6px 8px; text-align: left; font-weight: 400; border-bottom: 1px solid var(--border2); }
.ttable tbody tr { border-bottom: 1px solid var(--border); }
.ttable tbody tr:hover { background: var(--surface2); }
.ttable tbody tr.done { opacity: 0.55; }
.ttable td { padding: 4px 8px; vertical-align: middle; font-size: 12px; }
.site-tag { font-family: 'DM Mono', monospace; font-size: 8px; padding: 2px 5px; border-radius: 2px; white-space: nowrap; }
.gg { background: rgba(52,152,219,0.15); color: #5dade2; border: 1px solid rgba(52,152,219,0.3); }
.ps { background: rgba(155,89,182,0.15); color: #a569bd; border: 1px solid rgba(155,89,182,0.3); }
.wpt { background: rgba(46,204,113,0.15); color: #58d68d; border: 1px solid rgba(46,204,113,0.3); }
.ya { background: rgba(241,196,15,0.15); color: #f4d03f; border: 1px solid rgba(241,196,15,0.3); }
.pp { background: rgba(231,76,60,0.15); color: #ec7063; border: 1px solid rgba(231,76,60,0.3); }
.other { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }
.tname { font-size: 11px; color: var(--text); max-width: 180px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.tbi { font-family: 'Bebas Neue', sans-serif; font-size: 14px; color: var(--accent); white-space: nowrap; }
.tprofit { font-family: 'Bebas Neue', sans-serif; font-size: 14px; white-space: nowrap; }
.tprofit.pos { color: var(--green); }
.tprofit.neg { color: var(--red); }
.btngrp { display: flex; gap: 3px; }
.tbtn { padding: 3px 7px; border: 1px solid var(--border); background: var(--surface2); color: var(--muted); font-family: 'DM Mono', monospace; font-size: 8px; cursor: pointer; border-radius: 3px; white-space: nowrap; }
.tbtn.bust { border-color: var(--red); color: var(--red); background: var(--red-dim); }
.tbtn.itm { border-color: var(--green); color: var(--green); background: var(--green-dim); }
.tbtn.del { color: var(--muted2); }
.edit-inp { background: transparent; border: none; font-family: inherit; font-size: inherit; color: inherit; width: 100%; padding: 0; }
.edit-inp:focus { outline: none; border-bottom: 1px solid var(--accent); }
.bi-inp { background: transparent; border: none; font-family: 'Bebas Neue', sans-serif; font-size: 14px; color: var(--accent); width: 60px; padding: 0; }
.bi-inp:focus { outline: none; border-bottom: 1px solid var(--accent); }
.site-sel { background: transparent; border: none; font-family: 'DM Mono', monospace; font-size: 8px; cursor: pointer; padding: 0; color: inherit; }
.site-sel:focus { outline: none; }
.empty-msg { text-align: center; padding: 40px; color: var(--muted2); font-family: 'DM Mono', monospace; font-size: 10px; }

/* HISTORICO */
.hist-wrap { flex: 1; overflow-y: auto; padding: 14px; display: none; }
.hstat3 { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; margin-bottom: 16px; }
.hstat { background: var(--surface); border: 1px solid var(--border); border-radius: 5px; padding: 10px; }
.hstat-n { font-family: 'Bebas Neue', sans-serif; font-size: 24px; color: var(--accent); line-height: 1; }
.hstat-n.pos { color: var(--green); }
.hstat-n.neg { color: var(--red); }
.hstat-l { font-family: 'DM Mono', monospace; font-size: 8px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; margin-top: 2px; }
.hcard { background: var(--surface); border: 1px solid var(--border); border-radius: 5px; margin-bottom: 8px; overflow: hidden; }
.hcard-hdr { display: flex; justify-content: space-between; align-items: center; padding: 10px 14px; cursor: pointer; }
.hcard-hdr:hover { background: var(--surface2); }
.hcard-date { font-size: 13px; font-weight: 500; }
.hcard-meta { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); margin-top: 2px; }
.hcard-profit { font-family: 'Bebas Neue', sans-serif; font-size: 20px; }
.hcard-profit.pos { color: var(--green); }
.hcard-profit.neg { color: var(--red); }
.hcard-body { display: none; border-top: 1px solid var(--border); }
.hcard-body.open { display: block; }
.hcard-row { display: flex; justify-content: space-between; padding: 7px 14px; border-bottom: 1px solid var(--border); font-size: 12px; }
.hcard-row:last-child { border-bottom: none; }

/* ITM MODAL */
.modal-ov { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200; display: flex; align-items: flex-end; justify-content: center; }
.modal { background: var(--surface); border: 1px solid var(--border); border-top: 2px solid var(--accent); border-radius: 10px 10px 0 0; padding: 20px 16px; width: 100%; max-width: 400px; animation: slideUp 0.2s ease; }
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
.modal-title { font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 2px; color: var(--accent); margin-bottom: 3px; }
.modal-sub { font-size: 11px; color: var(--muted); margin-bottom: 12px; }
.modal-inp { width: 100%; background: var(--surface2); border: 1px solid var(--border); color: var(--text); font-size: 20px; padding: 12px; border-radius: 4px; margin-bottom: 10px; text-align: center; font-family: 'Bebas Neue', sans-serif; }
.modal-inp:focus { outline: none; border-color: var(--accent); }
.modal-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.mbtn { padding: 12px; border-radius: 4px; font-family: 'Bebas Neue', sans-serif; font-size: 14px; letter-spacing: 2px; cursor: pointer; border: none; }
.mbtn.ok { background: var(--green); color: #000; }
.mbtn.cancel { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }
</style>
</head>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbx3LbCny5wQ_J6M5-J1EMmhwj5hd83EdWhr6Qv_X5XERxQyKN0AzZ5fxXH8CTuyO58Y/exec';
const SHEET_ID = '1W7hEKSNEh2W03bDj9d_qIQkkoWHQqTYuxvC9FY3PMp8';
const SHEET_NAME = 'tracker';
const SITES = ['GGPoker','PokerStars','PokerStars ES','WPT Global','PartyPoker','Ya Poker','iPoker','WPN','Champion','Slot Poker','Outro'];

let torneios = JSON.parse(localStorage.getItem('ht_sess') || '[]');
let imgB64 = null;
let itmId = null;
let histView = false;

function siteClass(s) {
  s = (s||'').toLowerCase();
  if (s.includes('gg')) return 'gg';
  if (s.includes('stars') || s.includes('ps')) return 'ps';
  if (s.includes('wpt')) return 'wpt';
  if (s.includes('ya')) return 'ya';
  if (s.includes('party') || s.includes('pp')) return 'pp';
  return 'other';
}

function save() { localStorage.setItem('ht_sess', JSON.stringify(torneios)); }

function render() {
  const tbody = document.getElementById('tbody');
  if (torneios.length === 0) {
    tbody.innerHTML = '<tr><td colspan="5" class="empty-msg">Envie um print para adicionar torneios</td></tr>';
    updateStats(); return;
  }
  const sOpts = SITES.map(s => `<option value="${s}">${s}</option>`).join('');
  tbody.innerHTML = torneios.map(t => {
    const luc = t.res ? t.premio - t.buyin : null;
    const isPos = luc !== null && luc >= 0;
    const sc = siteClass(t.site);
    return `<tr class="${t.res?'done':''}">
      <td><select class="site-sel ${sc}" onchange="ef('${t.id}','site',this.value)">${SITES.map(s=>`<option value="${s}"${s===t.site?' selected':''}>${s}</option>`).join('')}</select></td>
      <td class="tname"><input class="edit-inp tname" type="text" value="${t.nome}" onblur="ef('${t.id}','nome',this.value)"></td>
      <td><input class="bi-inp" type="number" value="${t.buyin}" step="0.01" onblur="ef('${t.id}','buyin',parseFloat(this.value)||0)"></td>
      <td>${t.res ? `<span class="tprofit ${isPos?'pos':'neg'}">${isPos?'+':'-'}$${Math.abs(luc).toFixed(2)}</span>` : ''}</td>
      <td><div class="btngrp">${t.res ? '' : `<button class="tbtn del" onclick="rm('${t.id}')">✕</button><button class="tbtn bust" onclick="mkBust('${t.id}')">Bust</button><button class="tbtn itm" onclick="mkITM('${t.id}')">ITM</button>`}</div></td>
    </tr>`;
  }).join('');
  updateStats();
}

function updateStats() {
  const inv = torneios.reduce((s,t)=>s+t.buyin,0);
  const pre = torneios.reduce((s,t)=>s+t.premio,0);
  const luc = pre - inv;
  const at = torneios.filter(t=>!t.res).length;
  const abi = torneios.length > 0 ? inv/torneios.length : 0;
  const itm = torneios.filter(t=>t.res&&t.res!=='bust').length;
  const bust = torneios.filter(t=>t.res==='bust').length;
  const fin = torneios.filter(t=>t.res).length;
  const roi = inv > 0 ? ((luc/inv)*100).toFixed(0) : 0;

  document.getElementById('s-at').textContent = at;
  document.getElementById('s-tot').textContent = torneios.length;
  document.getElementById('s-inv').textContent = '$'+inv.toFixed(0);
  document.getElementById('s-abi').textContent = '$'+abi.toFixed(0);
  document.getElementById('s-pre').textContent = '$'+pre.toFixed(0);
  const lEl = document.getElementById('s-luc');
  lEl.textContent = (luc>=0?'+':'')+('$'+luc.toFixed(0));
  lEl.className = 'sc-n '+(luc>=0?'pos':'neg');

  if (torneios.length > 0) {
    document.getElementById('sl').style.display = 'block';
    document.getElementById('sstats').style.display = 'block';
    document.getElementById('ss-itm').textContent = itm;
    document.getElementById('ss-bust').textContent = bust;
    document.getElementById('ss-pct').textContent = fin>0 ? Math.round(itm/fin*100)+'%' : '0%';
    const rEl = document.getElementById('ss-roi');
    rEl.textContent = (parseInt(roi)>=0?'+':'')+roi+'%';
    rEl.className = 'sstat-v '+(parseInt(roi)>=0?'pos':'neg');
  }
}

function ef(id, field, val) {
  const t = torneios.find(x=>x.id==id);
  if (!t) return;
  t[field] = field==='buyin' ? parseFloat(val)||0 : val;
  save(); render();
}

function rm(id) { torneios = torneios.filter(x=>x.id!=id); save(); render(); }

function mkBust(id) {
  const t = torneios.find(x=>x.id==id);
  if (t) { t.res='bust'; t.premio=0; save(); render(); }
}

function mkITM(id) {
  itmId = id;
  const t = torneios.find(x=>x.id==id);
  document.getElementById('modal-sub').textContent = `${t.site} — $${t.buyin}`;
  document.getElementById('modal-val').value = '';
  document.getElementById('modal').style.display = 'flex';
  setTimeout(()=>document.getElementById('modal-val').focus(), 200);
}

function confirmITM() {
  const t = torneios.find(x=>x.id==itmId);
  if (t) { t.res='itm'; t.premio=parseFloat(document.getElementById('modal-val').value)||0; save(); render(); }
  document.getElementById('modal').style.display = 'none';
}

function closeModal(e) { if (e.target.id==='modal') document.getElementById('modal').style.display='none'; }

function hf(e) { const f=e.target.files[0]; if(f) processImg(f); }
function ev(e) { e.preventDefault(); document.querySelector('.upload-zone').style.borderColor='var(--accent)'; }
function el(e) { document.querySelector('.upload-zone').style.borderColor='var(--border2)'; }
function ed(e) { e.preventDefault(); el(e); const f=e.dataTransfer.files[0]; if(f&&f.type.startsWith('image/')) processImg(f); }

function processImg(f) {
  const r = new FileReader();
  r.onload = e => {
    imgB64 = e.target.result.split(',')[1];
    document.getElementById('prev-img').src = e.target.result;
    document.getElementById('prev-wrap').style.display = 'block';
    document.querySelector('.upload-zone').style.display = 'none';
    document.getElementById('abtn').style.display = 'block';
  };
  r.readAsDataURL(f);
}

function clearPrev() {
  imgB64 = null;
  document.getElementById('prev-wrap').style.display = 'none';
  document.querySelector('.upload-zone').style.display = 'block';
  document.getElementById('abtn').style.display = 'none';
  document.getElementById('fi').value = '';
}

async function analyze() {
  if (!imgB64) return;
  document.getElementById('abtn').style.display = 'none';
  document.getElementById('prev-wrap').style.display = 'none';
  document.getElementById('loading').style.display = 'block';
  try {
    const res = await fetch('/api/analyze', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{role:'user',content:[
          {type:'image',source:{type:'base64',media_type:'image/png',data:imgB64}},
          {type:'text',text:'Analise este screenshot de poker online. Identifique TODOS os torneios visíveis. Para cada um extraia: site (GGPoker, PokerStars, WPT Global, PartyPoker, Ya Poker, iPoker, ou outro), buyin (número em dólares, sem símbolo), nome. Responda APENAS JSON: {"torneios":[{"site":"GGPoker","buyin":25,"nome":"GGMasters"}]}'}
        ]}]
      })
    });
    const data = await res.json();
    console.log('API:', JSON.stringify(data));
    if (data.error) throw new Error(data.error.message);
    if (!data.content || !data.content[0]) throw new Error('Resposta inválida');
    const text = data.content[0].text;
    const parsed = JSON.parse(text.replace(/```json|```/g,'').trim());
    const now = new Date();
    const dt = now.toLocaleDateString('pt-BR');
    const hr = now.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
    (parsed.torneios||[]).forEach(t => {
      torneios.push({id: Date.now()+Math.random(), site:t.site||'Outro', buyin:parseFloat(t.buyin)||0, nome:t.nome||'—', res:null, premio:0, data:dt, hora:hr});
    });
    save(); render();
  } catch(e) {
    alert('Erro: '+e.message);
    document.getElementById('abtn').style.display = 'block';
    document.getElementById('prev-wrap').style.display = 'block';
  }
  document.getElementById('loading').style.display = 'none';
  document.querySelector('.upload-zone').style.display = 'block';
  clearPrev();
}

async function endSession() {
  if (!torneios.length) return;
  if (!confirm('Encerrar sessão e salvar?')) return;
  const dt = new Date().toLocaleDateString('pt-BR');
  for (const t of torneios) {
    await appendRow([t.data||dt, t.hora||'', t.site, t.nome, t.buyin, t.premio, t.premio-t.buyin, t.res||'ativo']);
  }
  const hist = JSON.parse(localStorage.getItem('ht_hist')||'[]');
  const inv=torneios.reduce((s,t)=>s+t.buyin,0), pre=torneios.reduce((s,t)=>s+t.premio,0);
  hist.unshift({data:dt, torneios:[...torneios], inv, pre, luc:pre-inv});
  localStorage.setItem('ht_hist', JSON.stringify(hist));
  torneios=[]; save(); render();
  alert('Sessão salva!');
}

async function appendRow(row) {
  try {
    await fetch(SCRIPT_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify({row,sheetId:SHEET_ID,sheetName:SHEET_NAME})});
  } catch(e) { console.error(e); }
}

function toggleHistorico() {
  histView = !histView;
  document.getElementById('twrap').style.display = histView ? 'none' : 'block';
  document.getElementById('side').style.display = histView ? 'none' : 'flex';
  document.getElementById('sbar').style.display = histView ? 'none' : 'flex';
  document.getElementById('hist-wrap').style.display = histView ? 'block' : 'none';
  document.getElementById('hist-btn').className = histView ? 'hist-btn active' : 'hist-btn';
  if (histView) renderHist();
}

function renderHist() {
  const hist = JSON.parse(localStorage.getItem('ht_hist')||'[]');
  const tl = hist.reduce((s,h)=>s+(h.luc||0),0);
  const tt = hist.reduce((s,h)=>s+(h.torneios?.length||0),0);
  const ti = hist.reduce((s,h)=>s+(h.inv||0),0);
  const roi = ti>0 ? ((tl/ti)*100).toFixed(1) : '0';
  document.getElementById('hstats').innerHTML = `
    <div class="hstat"><div class="hstat-n ${tl>=0?'pos':'neg'}">${tl>=0?'+':'-'}$${Math.abs(tl).toFixed(0)}</div><div class="hstat-l">Lucro Total</div></div>
    <div class="hstat"><div class="hstat-n">${hist.length}</div><div class="hstat-l">Sessões</div></div>
    <div class="hstat"><div class="hstat-n">${tt}</div><div class="hstat-l">Torneios</div></div>
    <div class="hstat"><div class="hstat-n ${parseFloat(roi)>=0?'pos':'neg'}">${parseFloat(roi)>=0?'+':''}${roi}%</div><div class="hstat-l">ROI</div></div>`;
  if (!hist.length) { document.getElementById('hlist').innerHTML = '<div style="text-align:center;padding:40px;color:var(--muted2);font-family:'DM Mono',monospace;font-size:10px;">Nenhuma sessão ainda.</div>'; return; }
  document.getElementById('hlist').innerHTML = hist.map((h,i) => {
    const luc=h.luc||0;
    return `<div class="hcard">
      <div class="hcard-hdr" onclick="document.getElementById('hb${i}').classList.toggle('open')">
        <div><div class="hcard-date">${h.data}</div><div class="hcard-meta">${h.torneios?.length||0} torneios • Inv $${(h.inv||0).toFixed(0)}</div></div>
        <div class="hcard-profit ${luc>=0?'pos':'neg'}">${luc>=0?'+':'-'}$${Math.abs(luc).toFixed(2)}</div>
      </div>
      <div class="hcard-body" id="hb${i}">
        ${(h.torneios||[]).map(t=>`<div class="hcard-row"><span>${t.site} — ${t.nome||''}</span><span style="font-family:'Bebas Neue',sans-serif;color:${(t.premio-t.buyin)>=0?'var(--green)':'var(--red)'};">${(t.premio-t.buyin)>=0?'+':'-'}$${Math.abs(t.premio-t.buyin).toFixed(2)}</span></div>`).join('')}
      </div>
    </div>`;
  }).join('');
}

render();
</script>
</body>
</html>
